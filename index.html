<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计探索2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="white-wipe" id="whiteWipe"></div>
    
    <div class="parallax-backgrounds" id="parallaxBackgrounds">
        <div class="parallax-bg" data-index="0">
            <video src="misan.webm" muted loop playsinline autoplay></video>
        </div>
        <div class="parallax-bg" data-index="1">
            <video src="canting.webm?v=2" muted loop playsinline autoplay></video>
            <img src="zhezhao.png" class="mask-overlay" alt="mask">
        </div>
        <div class="parallax-bg" data-index="2">
            <video src="home.webm?v=2" muted loop playsinline autoplay></video>
            <img src="zhezhao.png" class="mask-overlay" alt="mask">
        </div>
    </div>

    <div class="fixed-texts" id="fixedTexts">
        <div class="fixed-text" data-text-index="0">BEFORE</div>
        <div class="fixed-text" data-text-index="1">NOW</div>
        <div class="fixed-text" data-text-index="2">NOW</div>
    </div>

    <div class="fixed-text-groups" id="fixedTextGroups">
        <div class="text-group" data-group-index="0">
            <div class="text-row text-row-title">BEFORE</div>
            <div class="text-row text-row-1">固定展示</div>
            <div class="text-row text-row-2">屏效压缩空间小</div>
        </div>
        <div class="text-group" data-group-index="1">
            <div class="text-row text-row-1">保留凭证</div>
            <div class="text-row text-row-2">方便快速核销</div>
        </div>
        <div class="text-group" data-group-index="2">
            <div class="text-row text-row-1">不展示核销凭证</div>
            <div class="text-row text-row-2">继续逛更多</div>
        </div>
    </div>
    
    <div class="scroll-container" id="scrollContainer">
        <section class="page" data-page="0">
            <img src="before.png" class="page-content-image" alt="before">
        </section>
        <section class="page" data-page="1">
            <img src="daodian.png" class="page-content-image" alt="daodian">
        </section>
        <section class="page" data-page="2">
            <img src="daojia.png" class="page-content-image" alt="daojia">
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
